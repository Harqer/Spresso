appId: com.meta.wearable.retail
---
- clearState
- launchApp

# --- 1. IDENTITY PULSE ---
- assertVisible: "Vaultier"
- tapOn: "Sign In with Google"
- waitForAnimationEnd

# --- 2. HARDWARE PULSE ---
- assertVisible: "Link your Glasses"
- tapOn: "Continue"

# --- 3. DISCOVERY CYCLE ---
- assertVisible: "Welcome to Vaultier"
- tapOn: "Welcome to Vaultier"

- assertVisible: "Visionary Voice"
- tapOn: "Visionary Voice"

- assertVisible: "Vaultier"
- assertVisible: "Welcome to Vaultier.*"

# Agentic Discovery Test
- tapOn: "Search or ask Vaultier..."
- inputText: "Find me a biomorphic chrome jacket."
- tapOn:
    id: "Send"
- waitForAnimationEnd
- assertVisible: "Vaultier is reasoning..."

# --- 4. CART & CHECKOUT PULSE ---
- tapOn: "ADD TO CART"
- tapOn:
    id: "Cart"

- assertVisible: "Summary"
- assertVisible: "Total"
- tapOn: "Confirm Purchase"

# Verify HITL Biometric Trigger
- assertVisible: "Confirm Purchase"
- assertVisible: "Finalize order"
