name: 'Build Android Release'
description: 'Assembles the production release APK for Meta glasses'
inputs:
  github_token:
    description: 'GitHub Token for DAT SDK access'
    required: true
  spresso_secret:
    description: 'Spresso Internal Secret'
    required: true
runs:
  using: "composite"
  steps:
    - name: Set up JDK 23
      uses: actions/setup-java@v4
      with:
        java-version: '23'
        distribution: 'temurin'

    - name: Build Android Release
      shell: bash
      working-directory: aura-mobile-android
      run: ./gradlew assembleRelease
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        SPRESSO_INTERNAL_SECRET: ${{ inputs.spresso_secret }}
