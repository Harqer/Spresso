name: 'Build Web UI'
description: 'Builds and hardens the React/Vite production bundle'
inputs:
  clerk_key:
    description: 'Clerk Publishable Key'
    required: true
  sentry_dsn:
    description: 'Sentry DSN'
    required: true
  turnstile_key:
    description: 'Cloudflare Turnstile Site Key'
    required: true
runs:
  using: "composite"
  steps:
    - name: Web UI Type Check
      shell: bash
      run: |
        pnpm install
        pnpm tsc --noEmit

    - name: Build Web UI
      shell: bash
      run: |
        pnpm build
      env:
        VITE_CLERK_PUBLISHABLE_KEY: ${{ inputs.clerk_key }}
        VITE_SENTRY_DSN: ${{ inputs.sentry_dsn }}
        VITE_TURNSTILE_SITE_KEY: ${{ inputs.turnstile_key }}
