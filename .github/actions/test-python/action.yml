name: 'Test Python Backend'
description: 'Installs dependencies and runs pytest for the Cortex'
runs:
  using: "composite"
  steps:
    - name: Sync Dependencies
      shell: bash
      working-directory: Retail-Agentic-Commerce
      run: |
        uv sync --all-extras --all-groups

    - name: Python Linting
      shell: bash
      working-directory: Retail-Agentic-Commerce
      run: |
        uv run ruff check src/
        uv run ruff format --check src/

    - name: Python Type Check
      shell: bash
      working-directory: Retail-Agentic-Commerce
      run: |
        uv run pyright src/

    - name: Run Backend Live Feature Tests
      shell: bash
      working-directory: Retail-Agentic-Commerce
      run: |
        # Expert Strategy: Start the Cortex in background to test real features
        uv run uvicorn src.merchant.main:app --port 8000 &
        sleep 5
        
        # Run tests with mocks disabled to verify production readiness
        LIVE_INTEGRATION_TEST=true uv run pytest tests/ -v
      env:
        ENV: production
        GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}
        VAULTIER_INTERNAL_SECRET: ${{ env.VAULTIER_INTERNAL_SECRET }}
        MERCHANT_API_KEY: ${{ env.MERCHANT_API_KEY }}
