# Spresso Industrial Autonomous Pipeline
# 2026 Agentic Commerce Standards: Security, Identity, and Autonomic Repair

stages:
  - validate
  - security
  - identity-pulse
  - test
  - deploy-staging
  - hardware-verification
  - deploy-prod
  - audit-log
  - checkpoint

variables:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .uv-cache
    - .pnpm-cache
    - .gradle

# --- 1. AUTONOMIC VALIDATION & REPAIR ---
# --- FAILURE FEEDBACK SINK (The Alert System) ---
.failure-template:
  after_script:
    - >
      if [ "$CI_JOB_STATUS" == "failed" ]; then
        echo 'Alerting Spresso Agent...';
        export REDIS_URL="https://next-phoenix-124600.upstash.io";
        ALERT_JSON="{\"job\": \"$CI_JOB_NAME\", \"url\": \"$CI_JOB_URL\", \"error\": \"Pipeline failure detected in production pulse.\"}";
        if [ -n "$UPSTASH_REDIS_REST_TOKEN" ]; then
          curl -X POST "$REDIS_URL/set/spresso:pipeline:alert" -H "Authorization: Bearer $UPSTASH_REDIS_REST_TOKEN" -d "$ALERT_JSON";
        fi
      fi

lint-and-autofix:
  extends: .failure-template
  stage: validate
  image: node:22-bookworm
  script:
    - "npm install -g pnpm"
    - "# Industrial Strategy: Bypass minimum-release-age for verified production pulse"
    - "pnpm install --frozen-lockfile --no-verify-store-integrity || pnpm install --no-frozen-lockfile"
    - "cd Retail-Agentic-Commerce/src/ui"
    - "echo 'Running ESLint Pulse...'"
    - "if ! pnpm run lint; then
        echo 'Fixable errors detected. Initiating Autonomic Repair...';
        pnpm run format;
        pnpm exec eslint --fix .;
        git config --global user.email \"bot@spresso.ai\";
        git config --global user.name \"Spresso Autonomic Bot\";
        git add .;
        git commit -m \"Autonomic Repair: Resolved linting errors [ci skip]\";
        # Use provided GitLab token for autonomic push
        git push https://oauth2:${GITLAB_AUTO_MERGE_TOKEN}@gitlab.com/Harqer/spresso.git HEAD:${CI_COMMIT_REF_NAME};
        exit 1;
      fi"
  rules:
    - if: '$CI_COMMIT_AUTHOR != "Spresso Autonomic Bot"'

# --- 2. INDUSTRIAL SECURITY SCANNING ---
security-pulse:
  stage: security
  image: ubuntu:22.04
  script:
    - "apt-get update && apt-get install -y curl npm python3-pip golang"
    - "npm install -g pnpm"
    # JS/TS Audit
    - "pnpm install --no-frozen-lockfile"
    - "cd Retail-Agentic-Commerce/src/ui && pnpm audit"
    - "echo 'Security Gate: Edge dependencies verified.'"
    # Python Security Scan (Bandit & Safety)
    - "cd ../../../Retail-Agentic-Commerce"
    - "pip3 install --break-system-packages bandit safety uv"
    - "bandit -r src/"
    - "uv pip list --format=freeze > requirements.txt"
    - "safety check -r requirements.txt || true" # warn for now
    # Go Security Scan (Govulncheck)
    - "cd ../spresso-gateway"
    - "go install golang.org/x/vuln/cmd/govulncheck@latest"
    - "$(go env GOPATH)/bin/govulncheck ./..."
    # Android Security Audit
    - "cd .. && ./gradlew lint"

# --- 3. IDENTITY & CLOUDFLARE HSM PULSE ---
secure-secrets-gate:
  stage: identity-pulse
  image: node:22-bookworm
  script:
    - "npm install -g pnpm"
    - "pnpm install --no-frozen-lockfile"
    - "cd spresso-edge && pnpm install"
    - "echo 'Verifying Identity Pulse (Firebase)...'"
    - "if [ -n \"$FIREBASE_TOKEN\" ]; then pnpm dlx firebase-tools projects:list --token $FIREBASE_TOKEN; fi"
    - "echo 'Syncing Hardened Secrets to Cloudflare HSM...'"
    - "echo \"$SPRESSO_INTERNAL_SECRET\" | pnpm dlx wrangler secret put AUTH_KEY --env production"
    - "echo \"$FIREBASE_PROJECT_ID\" | pnpm dlx wrangler secret put FIREBASE_PROJECT_ID --env production"

# --- 4. LLM LOGIC TESTING ---
llm-cortex-test:
  stage: test
  image: python:3.12
  script:
    - "curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | bash && apt-get install -y infisical"
    - "infisical login --method=universal-auth --client-id=$INFISICAL_CLIENT_ID --client-secret=$INFISICAL_CLIENT_SECRET --plain > /dev/null"
    - "pip install uv && cd Retail-Agentic-Commerce && uv sync"
    - "infisical run --env dev -- uv run python -m pytest tests/ -v"

# --- 5. HARDWARE VERIFICATION (APK) ---
hardware-pulse:
  stage: hardware-verification
  image: eclipse-temurin:21-jdk
  script:
    - "infisical run --env dev -- ./gradlew :wearable-retail-app:assembleDebug"
    - "./gradlew :wearable-retail-app:testDebugUnitTest"
  artifacts:
    paths:
      - "wearable-retail-app/build/outputs/apk/debug/*.apk"

# --- 6. AUTONOMOUS PROMOTION ---
promote-to-production:
  stage: deploy-prod
  image: node:22-bookworm
  script:
    - "npm install -g vercel pnpm"
    - "vercel deploy --prod --token=$VERCEL_API_TOKEN --yes"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  when: on_success

# --- 7. INDUSTRIAL CHECKPOINT (MIRROR) ---
create-mirror:
  stage: checkpoint
  image: alpine:latest
  script:
    - "apk add --no-cache git"
    - "git tag mirror-$(date +%s)"
    - "git push https://oauth2:${GITLAB_AUTO_MERGE_TOKEN}@gitlab.com/Harqer/spresso.git --tags"
